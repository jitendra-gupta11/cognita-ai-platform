{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1

kind: Ingress

metadata:

  name: ai-service

  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}

spec:

  ingressClassName: {{ .Values.ingress.className }}

  rules:

  - http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: {{ include "ai-service.fullname" . }}

            port:

              number: {{ .Values.service.port }}

{{- end }}
